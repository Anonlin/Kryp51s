<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kryp51s Favicon Generator</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #00ff88;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(26, 31, 58, 0.8);
            border: 2px solid #00ff88;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        h1 {
            text-align: center;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
            margin-bottom: 30px;
        }
        .preview-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin: 30px 0;
        }
        .preview-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(10, 14, 39, 0.5);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        .preview-item span {
            color: #00d9ff;
            min-width: 80px;
        }
        canvas {
            border: 1px solid #00ff88;
            background: white;
            image-rendering: pixelated;
        }
        .instructions {
            background: rgba(0, 255, 136, 0.1);
            border-left: 4px solid #00ff88;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
        }
        .instructions h3 {
            margin-top: 0;
            color: #00d9ff;
        }
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        .instructions li {
            margin: 8px 0;
            color: #00ff88;
        }
        button {
            background: linear-gradient(135deg, #00ff88 0%, #00d9ff 100%);
            color: #0a0e27;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px 5px;
            font-family: 'Courier New', monospace;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }
        .button-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .svg-code {
            background: #0a0e27;
            border: 1px solid #00ff88;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
            color: #00ff88;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 Kryp51s Favicon</h1>
        
        <div class="preview-section">
            <div class="preview-item">
                <span>16x16:</span>
                <canvas id="canvas16" width="16" height="16"></canvas>
            </div>
            <div class="preview-item">
                <span>32x32:</span>
                <canvas id="canvas32" width="32" height="32"></canvas>
            </div>
            <div class="preview-item">
                <span>64x64:</span>
                <canvas id="canvas64" width="64" height="64"></canvas>
            </div>
        </div>

        <div class="button-group">
            <button onclick="downloadPNG(16)">下载 16x16 PNG</button>
            <button onclick="downloadPNG(32)">下载 32x32 PNG</button>
            <button onclick="downloadPNG(64)">下载 64x64 PNG</button>
            <button onclick="downloadSVG()">下载 SVG</button>
        </div>

        <div class="instructions">
            <h3>使用说明：</h3>
            <ol>
                <li>点击上方按钮下载您需要的 favicon 格式</li>
                <li>将 <code>favicon.ico</code> 或 <code>.png</code> 文件放在网站根目录</li>
                <li>在 HTML 的 &lt;head&gt; 中添加：<br>
                    <code>&lt;link rel="icon" type="image/png" href="/favicon.png"&gt;</code>
                </li>
                <li>或使用 SVG 格式（现代浏览器支持）：<br>
                    <code>&lt;link rel="icon" type="image/svg+xml" href="/favicon.svg"&gt;</code>
                </li>
            </ol>
        </div>

        <div class="svg-code" id="svgCode"></div>
    </div>

    <script>
        const svgString = `<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bgGrad)"/>
  <text x="8" y="16" font-family="monospace" font-size="8" fill="#0f3" opacity="0.15">01</text>
  <text x="48" y="24" font-family="monospace" font-size="8" fill="#0ff" opacity="0.15">10</text>
  <text x="12" y="52" font-family="monospace" font-size="8" fill="#0f3" opacity="0.15">51</text>
  <path d="M32 12 L20 18 L20 30 Q20 42 32 50 Q44 42 44 30 L44 18 Z" fill="none" stroke="url(#lockGrad)" stroke-width="1.5" opacity="0.4"/>
  <g filter="url(#glow)">
    <path d="M26 26 L26 22 Q26 18 32 18 Q38 18 38 22 L38 26" fill="none" stroke="url(#lockGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="24" y="26" width="16" height="12" rx="2" fill="none" stroke="url(#lockGrad)" stroke-width="2.5"/>
    <circle cx="32" cy="31" r="2" fill="url(#lockGrad)"/>
    <rect x="31" y="31" width="2" height="4" fill="url(#lockGrad)"/>
  </g>
  <text x="32" y="46" font-family="monospace" font-size="9" font-weight="bold" fill="url(#lockGrad)" text-anchor="middle" filter="url(#glow)">51</text>
  <line x1="18" y1="20" x2="46" y2="20" stroke="#00ff88" stroke-width="0.5" opacity="0.3"/>
  <line x1="18" y1="35" x2="46" y2="35" stroke="#00d9ff" stroke-width="0.5" opacity="0.3"/>
  <path d="M8 8 L12 8 M8 8 L8 12" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
  <path d="M56 8 L52 8 M56 8 L56 12" stroke="#00d9ff" stroke-width="1.5" opacity="0.6"/>
  <path d="M8 56 L12 56 M8 56 L8 52" stroke="#00d9ff" stroke-width="1.5" opacity="0.6"/>
  <path d="M56 56 L52 56 M56 56 L56 52" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
</svg>`;

        document.getElementById('svgCode').textContent = svgString;

        function renderCanvas(canvas, size) {
            const ctx = canvas.getContext('2d');
            const img = new Image();
            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            
            img.onload = function() {
                ctx.drawImage(img, 0, 0, size, size);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        renderCanvas(document.getElementById('canvas16'), 16);
        renderCanvas(document.getElementById('canvas32'), 32);
        renderCanvas(document.getElementById('canvas64'), 64);

        function downloadPNG(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            
            img.onload = function() {
                ctx.drawImage(img, 0, 0, size, size);
                canvas.toBlob(function(blob) {
                    const link = document.createElement('a');
                    link.download = `kryp51s-favicon-${size}x${size}.png`;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                    URL.revokeObjectURL(url);
                });
            };
            img.src = url;
        }

        function downloadSVG() {
            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const link = document.createElement('a');
            link.download = 'kryp51s-favicon.svg';
            link.href = URL.createObjectURL(blob);
            link.click();
        }
    </script>
</body>
</html>
