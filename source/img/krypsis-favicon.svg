<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 深色背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    
    <!-- 主色渐变 - 从可见到隐形 -->
    <linearGradient id="fadeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d9ff;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:0.2" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 虚化效果 -->
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="64" height="64" rx="12" fill="url(#bgGrad)"/>
  
  <!-- 隐形斗篷效果 - 半透明幽灵轮廓 -->
  <path d="M32 18 Q24 22 24 32 Q24 42 32 46 Q40 42 40 32 Q40 22 32 18 Z" 
        fill="none" 
        stroke="url(#fadeGrad)" 
        stroke-width="1" 
        opacity="0.3"
        filter="url(#blur)"/>
  
  <!-- K字母 - 渐变消失效果 -->
  <g filter="url(#glow)">
    <!-- K的竖线 - 实线 -->
    <line x1="20" y1="22" x2="20" y2="42" 
          stroke="#00ff88" 
          stroke-width="2.5" 
          stroke-linecap="round"/>
    
    <!-- K的上斜线 - 开始虚化 -->
    <line x1="20" y1="30" x2="28" y2="22" 
          stroke="url(#fadeGrad)" 
          stroke-width="2.5" 
          stroke-linecap="round"
          opacity="0.9"/>
    
    <!-- K的下斜线 - 更虚 -->
    <line x1="20" y1="30" x2="28" y2="42" 
          stroke="url(#fadeGrad)" 
          stroke-width="2.5" 
          stroke-linecap="round"
          opacity="0.7"/>
  </g>
  
  <!-- 5→S - 逐渐虚化 -->
  <text x="34" y="38" 
        font-family="monospace" 
        font-size="18" 
        font-weight="bold" 
        fill="url(#fadeGrad)"
        filter="url(#glow)"
        opacity="0.8">5</text>
  
  <!-- 1→I - 几乎隐形 -->
  <text x="44" y="38" 
        font-family="monospace" 
        font-size="18" 
        font-weight="bold" 
        fill="url(#fadeGrad)"
        filter="url(#blur)"
        opacity="0.5">1</text>
  
  <!-- 隐匿视觉：数字代码流 - 暗示加密 -->
  <text x="10" y="14" font-family="monospace" font-size="6" fill="#00ff88" opacity="0.2">010</text>
  <text x="45" y="14" font-family="monospace" font-size="6" fill="#00d9ff" opacity="0.2">101</text>
  <text x="8" y="56" font-family="monospace" font-size="6" fill="#00d9ff" opacity="0.15">κρύψις</text>
  
  <!-- 扫描线 - 暗示隐形技术 -->
  <line x1="15" y1="25" x2="50" y2="25" stroke="#00ff88" stroke-width="0.3" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="15" y1="35" x2="50" y2="35" stroke="#00d9ff" stroke-width="0.3" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.5;0.25" dur="2.5s" repeatCount="indefinite"/>
  </line>
  
  <!-- 角落标记 - 像素化风格 -->
  <rect x="8" y="8" width="3" height="3" fill="#00ff88" opacity="0.5"/>
  <rect x="53" y="8" width="3" height="3" fill="#00d9ff" opacity="0.5"/>
  <rect x="8" y="53" width="3" height="3" fill="#00d9ff" opacity="0.4"/>
  <rect x="53" y="53" width="3" height="3" fill="#00ff88" opacity="0.4"/>
  
  <!-- 隐形粒子效果 -->
  <circle cx="38" cy="20" r="0.8" fill="#00ff88" opacity="0.4"/>
  <circle cx="46" cy="28" r="0.6" fill="#00d9ff" opacity="0.3"/>
  <circle cx="42" cy="48" r="0.7" fill="#00ff88" opacity="0.35"/>
</svg>